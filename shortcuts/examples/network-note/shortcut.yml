id: com.shortcuts.examples.network-note
name: Network Note
version: 0.1.0
summary: Fetch a text note from an approved example endpoint and copy it to the clipboard.
category: productivity
status: experimental
license: MIT
maintainers:
  - name: shortcuts maintainers
compatibility:
  platforms:
    ios: ">=18"
    ipados: ">=18"
    macos: ">=15"
  devices:
    apple_intelligence_required: false
source:
  mode: manual
  entrypoint: src/shortcut.md
declared_permissions:
  clipboard:
    read: false
    write: true
  network:
    allowed: true
    domains:
      - example.com
  ai:
    uses_model_action: false
  shell: false
  url_schemes: []
security:
  tier: sensitive
  data_leaves_device: true
  review_status: seed-reviewed
tests:
  static:
    enabled: true
  runtime:
    enabled: false
