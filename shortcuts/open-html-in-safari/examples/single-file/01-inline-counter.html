<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open HTML Inline Counter</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f7f3e8, #d9edf7 45%, #1d3557);
        color: #10202f;
      }
      main {
        width: min(34rem, calc(100vw - 2rem));
        padding: 2rem;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(16, 32, 47, 0.12);
        border-radius: 16px;
        box-shadow: 0 24px 80px rgba(16, 32, 47, 0.22);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.75rem;
      }
      p {
        line-height: 1.5;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 0.8rem 1rem;
        background: #1d3557;
        color: white;
        font: inherit;
      }
      output {
        display: inline-grid;
        min-width: 3ch;
        margin-left: 0.75rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Inline Counter</h1>
      <p>This single HTML file uses only inline CSS and JavaScript.</p>
      <button id="increment" type="button">Increment</button>
      <output id="count">0</output>
    </main>
    <script>
      const count = document.querySelector("#count");
      document.querySelector("#increment").addEventListener("click", () => {
        count.textContent = String(Number(count.textContent) + 1);
      });
    </script>
  </body>
</html>
