<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open HTML Form State</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #13293d;
        color: #f7fbff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      form {
        width: min(34rem, calc(100vw - 2rem));
        display: grid;
        gap: 1rem;
      }
      input,
      button {
        border-radius: 10px;
        border: 1px solid rgba(247, 251, 255, 0.35);
        padding: 0.8rem 1rem;
        font: inherit;
      }
      input {
        background: rgba(255, 255, 255, 0.12);
        color: inherit;
      }
      button {
        background: #f4d35e;
        color: #13293d;
        font-weight: 700;
      }
      output {
        min-height: 2rem;
        color: #9bd1e5;
      }
    </style>
  </head>
  <body>
    <form id="form">
      <h1>Form State</h1>
      <label>
        Message
        <input id="message" value="Open HTML ran JavaScript in Safari" />
      </label>
      <button type="submit">Render message</button>
      <output id="result">Submit the form to update this output.</output>
    </form>
    <script>
      document.querySelector("#form").addEventListener("submit", (event) => {
        event.preventDefault();
        document.querySelector("#result").textContent =
          document.querySelector("#message").value;
      });
    </script>
  </body>
</html>
