name: macOS Runtime

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - run: uv run shortcutkit test shortcuts/examples/clean-clipboard --json
