[project]
name = "shortcutkit"
version = "0.1.0"
description = "Developer tooling for source-first Apple Shortcuts and App Intents projects."
requires-python = ">=3.13"
dependencies = [
  "jsonschema>=4.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "pyyaml>=6.0",
  "rich>=13.0",
  "typer>=0.12",
]

[project.scripts]
shortcutkit = "shortcutkit.cli:app"
sk = "shortcutkit.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shortcutkit"]
